<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Configuration - FoodHub</title>
    <link rel="stylesheet" href="css/SITE-SETTING.css">
</head>
<body>
    <header class="navbar">

<div class="logo">
<div class="logo-icon">F</div>
<span>FoodHub <b>Admin</b></span>
</div>

<nav class="menu">
<a href="ADMIN-DASH.html">Dashboard</a>
<a class="active">Vendor Requests</a>
<a href="ADDS-upload.html">Video Ads</a>
<a>Site Settings</a>
<a>Live Preview</a>
</nav>

<div class="profile">

<div class="bell">🔔</div>

<div class="admin">
<span>Admin User</span>
<small>Super Admin</small>
</div>

<div class="avatar"></div>

</div>

</header>
    <div class="dashboard-container">
        <main class="content">
            <header>
                <h1>Site Configuration</h1>
                <p>Customize the look and feel of the marketplace.</p>
            </header>

            <section class="config-grid">
                <div class="card">
                    <h2>Appearance & Content</h2>
                    <label>Hero Section Title</label>
                    <input type="text" value="Delicious Food, Delivered Fast">
                    
                    <label>Hero Section Subtitle</label>
                    <textarea>Order from the best local vendors. Pay easily with Mobile Money.</textarea>
                    
                    <label>Announcement Bar</label>
                    <input type="text" value="🚀 Free delivery on your first order!">
                </div>

                <div class="card">
                    <h2>Business & Contact</h2>
                    <label>Delivery Fee</label>
                    <input type="number" value="500">
                    
                    <label>Currency</label>
                    <input type="text" value="F">
                    
                    <label>Support Email</label>
                    <input type="email" value="support@foodhub.com">
                    
                    <label>Support Phone</label>
                    <input type="text" value="+237 600 000 000">
                </div>
            </section>

            <button class="save-btn">Save All Settings</button>
        </main>
    </div>
</body>
</html>
